schema: spec-driven

# Project context shown to AI when creating OpenSpec artifacts. Migrated from
# the now-deleted openspec/project.md during the 1.2.0 skill-based layout
# migration. CLAUDE.md remains the authoritative long-form reference for
# architecture, commands, debugging, and release process.
context: |
  1Code (by apollosai.dev, enterprise fork) — local-first Electron desktop app for
  parallel AI-assisted development. Users create chat sessions linked to local
  project folders, interact with multiple AI backends (Claude, Codex, Ollama)
  in Plan or Agent mode, and see real-time tool execution (bash, file edits,
  web search, terminal). The enterprise fork is being decoupled from the
  upstream 21st.dev/1code.dev hosted backend in favor of self-hosted
  infrastructure (LiteLLM behind an Envoy Gateway with Microsoft Entra ID SSO).
  All SaaS features catalogued in .scratchpad/upstream-features-inventory.md
  (F1-F10) are being reverse-engineered and re-hosted on the Talos AI cluster.

  Tech stack: Electron ~39.8.7, electron-vite 3, React 19, TypeScript 5,
  Tailwind 3, Radix UI, Jotai + Zustand + React Query, tRPC + Drizzle ORM +
  better-sqlite3, @anthropic-ai/claude-agent-sdk, Codex CLI 0.118.0, Ollama.
  Package manager: bun. Tests: bun:test under tests/regression/ (structural
  guards only — broader test adoption is Phase 0 hard gate #11).

  Conventions: Components PascalCase, utilities/hooks camelCase, stores
  kebab-case, Jotai atoms camelCase + Atom suffix. Simplicity over complexity.
  IPC is tRPC over trpc-electron (21 routers in createAppRouter). State: Jotai
  for UI state, Zustand for persisted sub-chat tabs, React Query for server
  state via tRPC. Database: Drizzle ORM with auto-migration on app startup,
  schema at src/main/lib/db/schema/index.ts (7 tables including the new
  feature_flag_overrides). AI integration: dynamic import of the Claude Agent
  SDK with two modes — "plan" (read-only) and "agent" (full permissions).

  Domain vocabulary: Chat (top-level session linked to a project folder),
  SubChat (individual AI session within a chat, with mode plan/agent and
  sessionId for Claude resume), tool execution (real-time streaming of bash,
  file edits, web search), integrated terminal (node-pty + xterm.js).

  Important constraints: Local-first storage in SQLite at
  {userData}/data/agents.db. Auth credentials encrypted via Electron
  safeStorage. macOS notarization required for releases. Dev and production
  use separate userData paths and protocol handlers.

  Current migration posture: Phase 0 hard gates from strategy v2.1 §6 are
  landing incrementally. Gates #1-6 (dead IPC handler deletion, token log
  sanitization), #7 (binary checksum + GPG verification), #9 (minimum CI),
  #10 (Dependabot), #11 (bun:test), #12 (feature flags), #14 (Electron
  39.8.7), and #15 (F1-F10 decisions) are committed or in progress.
  Remaining: #8 (Claude Code OAuth env-var injection via Envoy Gateway).
  Phase 1 will land MSAL Node token acquisition and flip the
  enterpriseAuthEnabled feature flag.

  Key reference documents (for AI context during OpenSpec artifact creation):
  - CLAUDE.md — architecture, commands, patterns, Environment Notes,
    Known Security Gaps, Documentation Maintenance checklist
  - .scratchpad/auth-strategy-envoy-gateway.md v2.1 — chosen auth strategy,
    empirically validated via smoke test against the Talos AI cluster
  - .scratchpad/upstream-features-inventory.md v2 — F1-F10 SaaS dependency
    catalog with restoration decisions locked in 2026-04-08
  - .full-review/envoy-gateway-review/ — comprehensive review of the strategy

