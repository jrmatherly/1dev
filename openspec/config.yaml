schema: spec-driven

context: |
  Project: 1Code enterprise fork (apollosai.dev) — local-first Electron desktop app
  Tech stack: Electron 40, React 19, TypeScript 5, Tailwind 3, tRPC, Drizzle ORM, SQLite
  Package manager: bun
  AI backends: Claude Agent SDK, Codex CLI, Ollama
  Fork posture: Decoupling from upstream 1code.dev — self-hosting via LiteLLM + Entra + Envoy Gateway
  Quality gates: bun run ts:check + build + test + audit + docs build (5 gates)
  TS baseline: ~86 pre-existing errors (only new errors matter)
  Database: 8 tables in Drizzle schema (incl. feature_flag_overrides), auto-migrates on startup
  tRPC routers: 22 in createAppRouter (21 feature + 1 git), incl. enterpriseAuth
  Upstream boundary: remoteTrpc.* and fetch(${apiUrl}/) calls hit 1code.dev — must be replaced
  Brand taxonomy: Tier A/B/C per openspec/specs/brand-identity/spec.md
  Baseline specs: 9 capabilities, 45 requirements in openspec/specs/
  Phase 0: 15/15 hard gates complete. Enterprise auth wired (enterpriseAuthEnabled flag).
  K8s deployment: deploy/kubernetes/ — 3 components with ${PLACEHOLDER} substitution

rules:
  proposal:
    - Reference the upstream-features-inventory (F1-F10) when proposing changes that touch upstream-dependent code
    - Include which Phase 0 hard gate(s) the change advances, if any
    - Identify affected tRPC routers and database tables
  specs:
    - Use Given/When/Then scenario format
    - Reference existing patterns in the codebase before inventing new ones
    - Include regression guard requirements for any behavioral change
  design:
    - Reference the chosen auth strategy (Envoy Gateway dual-auth v2.1) when touching auth code
    - Call out any Electron-specific constraints (main/renderer process boundary, IPC)
    - Identify upstream boundary implications (remoteTrpc, apiUrl call sites)
  tasks:
    - Each task must be independently verifiable
    - Include quality gate verification as a task when code changes are involved
    - Reference specific file paths where changes will land
