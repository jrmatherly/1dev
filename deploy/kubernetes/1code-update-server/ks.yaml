---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 1code-update-server
spec:
  interval: 1h
  dependsOn:
    - name: coredns
      namespace: kube-system
  path: ./kubernetes/apps/<namespace>/1code-update-server/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: <namespace>
  wait: false
