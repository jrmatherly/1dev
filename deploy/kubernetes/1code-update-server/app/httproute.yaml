---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: 1code-update-server
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  hostnames:
    - "${UPDATE_HOSTNAME}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /releases
      backendRefs:
        - name: 1code-update-server
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /health
      backendRefs:
        - name: 1code-update-server
          port: 8080
