---
# 1Code Update Server
# Serves Electron auto-update manifests and release assets.
#
# The Electron desktop app checks this endpoint for updates:
#   GET /releases/desktop/latest-mac.yml    — macOS update manifest
#   GET /releases/desktop/latest-linux.yml  — Linux update manifest
#   GET /releases/desktop/latest.yml        — Windows update manifest
#   GET /releases/desktop/<asset-name>      — Release binaries (DMG, AppImage, etc.)
#
# This can be a simple static file server (nginx/caddy) serving
# the output of `electron-builder --publish never` uploaded to a
# persistent volume or object storage.
#
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: 1code-update-server
spec:
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: 1code-update-server
  interval: 1h
  values:
    controllers:
      1code-update-server:
        replicas: 1
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: "${IMAGE_REGISTRY}/1code-update-server"
              tag: "${IMAGE_TAG}"
            ports:
              - name: http
                containerPort: 8080
                protocol: TCP
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: http
                  initialDelaySeconds: 5
                  periodSeconds: 3
                  timeoutSeconds: 3
                  failureThreshold: 10
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: http
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: http
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              runAsUser: 1000
              capabilities:
                drop: ["ALL"]
              seccompProfile:
                type: RuntimeDefault
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 128Mi
    defaultPodOptions:
      # Uncomment if using a private image registry:
      # imagePullSecrets:
      #   - name: ghcr-pull-secret
      automountServiceAccountToken: false
      securityContext:
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        ports:
          http:
            port: 8080
    persistence:
      # Release assets storage — mount your PVC or object storage here
      releases:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 10Gi
        globalMounts:
          - path: /srv/releases
            readOnly: true
