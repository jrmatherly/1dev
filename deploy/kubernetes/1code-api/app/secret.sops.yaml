---
# SOPS secret template — encrypt before committing to your cluster repo.
#
# 1. Replace placeholder values with real credentials
# 2. Encrypt: sops --encrypt --age <your-age-public-key> --in-place secret.sops.yaml
# 3. Commit the encrypted file (it will have a `sops:` metadata block)
#
# Flux's kustomize-controller decrypts at reconciliation time using
# the Age key configured in the cluster's SOPS provider.
apiVersion: v1
kind: Secret
metadata:
  name: 1code-api-secret
type: Opaque
stringData:
  # Database connection URL (keeps credentials out of HelmRelease values)
  DATABASE_URL: "postgresql://REPLACE_DB_USER:REPLACE_DB_PASSWORD@REPLACE_DB_HOST:5432/REPLACE_DB_NAME"
  # API signing secret for desktop auth token exchange
  API_SECRET_KEY: "REPLACE_WITH_RANDOM_SECRET"
  # Optional: Sentry DSN for error tracking
  # SENTRY_DSN: ""
