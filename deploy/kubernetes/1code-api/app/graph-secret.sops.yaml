---
# SOPS secret template for the server-side Microsoft Graph client.
#
# Provisioned per Decision 1 in
# openspec/changes/add-1code-api-litellm-provisioning/design.md:
#
#   The existing `${ENTRA_CLIENT_ID}` is a PUBLIC client used by MSAL Node in
#   the Electron desktop app (loopback redirect, no secret, RFC 8252). A NEW
#   CONFIDENTIAL client must be minted for server-side Graph calls, with
#   `GroupMember.Read.All` APPLICATION permission and admin consent granted.
#   Its client secret is stored here, encrypted with SOPS.
#
# This secret is only required when PROVISIONING_ENABLED=true in the
# HelmRelease. It is referenced as an optional `envFrom` entry in
# helmrelease.yaml so the baseline endpoints (health/changelog/profile)
# keep working without it.
#
# Cluster operator workflow:
# 1. Mint the new confidential client in Entra portal (App registrations → New)
# 2. Grant `GroupMember.Read.All` (Application permission) and admin-consent it
# 3. Generate a client secret; record its value (you cannot retrieve it later)
# 4. Replace REPLACE_WITH_* placeholders below with the real values
# 5. Encrypt: sops --encrypt --age <cluster-age-pubkey> --in-place graph-secret.sops.yaml
# 6. Commit the encrypted file
#
# Flux's kustomize-controller decrypts at reconcile time using the Age key
# configured in the cluster's SOPS provider.
apiVersion: v1
kind: Secret
metadata:
  name: 1code-api-graph-secret
type: Opaque
stringData:
  # The confidential-client secret string minted above.
  AZURE_GRAPH_CLIENT_SECRET: "REPLACE_WITH_GRAPH_CLIENT_SECRET"
