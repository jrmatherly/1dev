---
# SOPS-encrypted secret for the OIDC client secret.
# Required by the SecurityPolicy's oidc.clientSecret reference.
#
# Replace the placeholder, then encrypt:
#   sops --encrypt --age <your-age-public-key> --in-place secret.sops.yaml
apiVersion: v1
kind: Secret
metadata:
  name: entra-oidc-client-secret
type: Opaque
stringData:
  client-secret: "REPLACE_WITH_ENTRA_CLIENT_SECRET"
