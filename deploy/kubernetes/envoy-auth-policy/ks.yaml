---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: envoy-auth-policy
spec:
  interval: 1h
  dependsOn:
    - name: envoy-gateway
      namespace: network
  path: ./kubernetes/apps/<namespace>/envoy-auth-policy/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: <namespace>
  wait: true
