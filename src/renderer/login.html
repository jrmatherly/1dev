<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';"
    />
    <title>1Code - Login</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* Dark theme (default) */
      :root {
        --bg: #09090b;
        --text: #fafafa;
        --text-logo: #fafafa;
        --btn-shadow:
          0 0 0 0.5px rgb(23, 23, 23), inset 0 0 0 1px rgba(255, 255, 255, 0.14);
      }

      /* Light theme */
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #ffffff;
          --text: #09090b;
          --text-logo: #09090b;
          --btn-shadow:
            0 0 0 0.5px rgba(0, 0, 0, 0.1), inset 0 0 0 1px rgba(0, 0, 0, 0.1);
        }
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        -webkit-app-region: drag;
      }
      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        -webkit-app-region: no-drag;
      }
      .logo {
        height: 72px;
        width: 72px;
      }
      .logo .logo-path {
        fill: var(--text-logo);
      }
      .login-btn {
        height: 32px;
        padding: 0 12px;
        background: hsl(228 100% 50%);
        color: #fafafa;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        transition:
          background-color 0.15s ease,
          transform 0.15s ease;
        box-shadow: var(--btn-shadow);
      }
      .login-btn:hover {
        background: hsl(228 100% 45%);
      }
      .login-btn:active {
        transform: scale(0.97);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- 1Code Logo -->
      <svg
        class="logo"
        viewBox="0 0 560 560"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          class="logo-path"
          fill-rule="evenodd"
          clip-rule="evenodd"
          d="M560 560H0V0H560V560ZM250.406 80C248.111 80 246.25 81.8658 246.25 84.167V175.833C246.25 178.134 244.389 180 242.094 180H84.1562C81.8608 180 80 181.866 80 184.167V275.833C80 278.134 81.8608 280 84.1562 280H231.249L231.995 280.065C235.63 280.68 236.766 285.707 233.375 287.747L84.043 377.575C81.5393 379.081 80.0001 381.793 80 384.72V438.333C80 461.345 98.6082 480 121.562 480H341.844C344.139 480 346 478.134 346 475.833V384.167C346 381.866 347.861 380 350.156 380H474.844C477.139 380 479 378.134 479 375.833V121.667C479 98.6551 460.392 80 437.438 80H250.406ZM341.844 180C344.139 180 346 181.866 346 184.167V375.833C346 378.134 344.139 380 341.844 380H250.406C248.111 380 246.25 378.134 246.25 375.833V184.167C246.25 181.866 248.111 180 250.406 180H341.844Z"
        />
      </svg>
      <button class="login-btn" id="loginBtn">Sign in</button>
    </div>
    <script>
      console.log("Login page loaded");
      console.log("window.desktopApi:", window.desktopApi);

      // Listen for auth success from main process (via deep link)
      // This ensures UI updates even if deep link arrives before click handler completes
      if (window.desktopApi && window.desktopApi.onAuthSuccess) {
        window.desktopApi.onAuthSuccess(function (user) {
          console.log("[Login] Auth success received:", user?.email);
          // Window will be reloaded by main process, no UI change needed
        });
      }

      document
        .getElementById("loginBtn")
        .addEventListener("click", function () {
          console.log("Sign in clicked");
          console.log("desktopApi available:", !!window.desktopApi);

          if (window.desktopApi && window.desktopApi.startAuthFlow) {
            console.log("Calling startAuthFlow...");
            window.desktopApi.startAuthFlow();
          } else {
            console.error("Desktop API not available");
            alert("Desktop API not available. Please restart the app.");
          }
        });
    </script>
  </body>
</html>
