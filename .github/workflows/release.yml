# Release workflow for the 1Code enterprise fork.
#
# Builds desktop installers (macOS, Linux, Windows) and publishes them as
# binary assets on a GitHub Release tied to the git tag.
#
# Architecture:
#   1. matrix-build: builds installers in parallel on macos-15,
#      ubuntu-latest, and windows-latest. Each job uploads its artifacts
#      to the workflow cache via actions/upload-artifact.
#   2. release: downloads all 3 OS artifact bundles and publishes them as
#      a single GitHub Release (softprops/action-gh-release).
#
# Triggers:
#   - push: tags: ['v*']   — standard release path (git tag drives version)
#   - workflow_dispatch    — manual escape hatch for testing or re-runs
#
# Signing status:
#   First iteration ships UNSIGNED artifacts on all 3 OSes. Users will see
#   Gatekeeper (macOS) and SmartScreen (Windows) warnings but installers
#   will work. Code signing is a follow-on hardening task once cert secrets
#   (Apple Developer ID, Windows EV) are provisioned via `gh secret set`.
#
# Auto-update provider:
#   package.json `build.publish.provider` is `github`, so electron-builder
#   auto-generates `latest-mac.yml`, `latest.yml`, and `latest-linux.yml`
#   during the package step and uploads them alongside the installers.
#   `electron-updater` in the installed app reads these manifests from the
#   GitHub Releases API and handles auto-updates natively.
#
# Security notes:
#   - Only pinned action versions (no @latest).
#   - All trusted `${{ github.* }}` values are passed through `env:` blocks
#     before being referenced in shell commands (injection-safe pattern).
#   - Top-level permissions minimized; release job upgrades to contents:write
#     only in its own scope.

name: "🚀 Release"

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., v0.0.73). Required for workflow_dispatch; must match an existing tag or will tag HEAD."
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  matrix-build:
    name: "📦 Build ${{ matrix.os }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            name: macos
            build-script: "package:mac"
          - os: ubuntu-latest
            name: linux
            build-script: "package:linux"
          - os: windows-latest
            name: windows
            build-script: "package:win"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: "📦 Install Bun"
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: "📦 Install Node 24"
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: "🔧 Install Linux system build deps"
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 libopenjp2-tools libarchive-tools

      # NOTE: No separate GPG install needed on Windows. The download script
      # converts all paths to MSYS-compatible POSIX format (/c/Users/... instead
      # of C:\Users\...) via toGpgPath() in download-claude-binary.mjs, which
      # makes the MSYS2-compiled GPG bundled with Git for Windows work correctly.
      # Previous attempts to install native GPG via Chocolatey (gpg4win, gnupg)
      # both hung indefinitely on CI runners (>20 min with no progress).

      - name: "⬇️ Install dependencies"
        run: bun install --frozen-lockfile

      - name: "⬇️ Download Claude CLI binary (pinned)"
        # macOS builds both arm64 + x64 (universal DMG/ZIP), so we need
        # binaries for both architectures. Linux/Windows only need their own.
        # Using --all downloads all 6 platforms — wasteful for Linux/Windows
        # and increases API calls for Codex (which is rate-limited).
        # macOS: download darwin-arm64 + darwin-x64 explicitly.
        shell: bash
        run: |
          if [ "${{ matrix.name }}" = "macos" ]; then
            bun run claude:download --platform=darwin-arm64
            bun run claude:download --platform=darwin-x64
          else
            bun run claude:download
          fi

      - name: "⬇️ Download Codex binary (pinned)"
        # GITHUB_TOKEN is scoped to this repo (jrmatherly/1dev) but the Codex
        # binary lives at openai/codex. Sending a cross-org Bearer token to
        # GitHub's API returns 403. Unsetting it falls through to unauthenticated
        # access (60 req/hour). GitHub Actions runners can hit secondary rate
        # limits from shared IPs, so we retry with backoff. Download only the
        # platforms needed for each OS (not --all) to minimize API calls.
        env:
          GITHUB_TOKEN: ""
        shell: bash
        run: |
          download_with_retry() {
            local max_attempts=3
            for attempt in $(seq 1 $max_attempts); do
              if bun run codex:download "$@"; then
                return 0
              fi
              if [ "$attempt" -lt "$max_attempts" ]; then
                echo "⚠️ Codex download attempt $attempt failed, retrying in ${attempt}0s..."
                sleep "${attempt}0"
              fi
            done
            echo "❌ Codex download failed after $max_attempts attempts"
            return 1
          }
          if [ "${{ matrix.name }}" = "macos" ]; then
            download_with_retry --platform=darwin-arm64
            download_with_retry --platform=darwin-x64
          else
            download_with_retry
          fi

      - name: "🏗️ Build application"
        # macOS-15 standard runners have only 7 GB RAM. The renderer build
        # bundles monaco-editor, mermaid, and shiki (463 output chunks) which
        # exhausts V8's auto-calculated heap limit (~4-5 GB on 7 GB machines).
        # Setting max-old-space-size explicitly gives the build enough headroom.
        # This is safe on all OSes — Linux/Windows have 16 GB and ignore the cap.
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"
          # Enterprise Entra ID auth — baked in at Vite build time.
          # Set these as GitHub repository secrets:
          #   ENTRA_CLIENT_ID, ENTRA_TENANT_ID
          MAIN_VITE_ENTERPRISE_AUTH_ENABLED: "true"
          MAIN_VITE_ENTRA_CLIENT_ID: ${{ secrets.ENTRA_CLIENT_ID }}
          MAIN_VITE_ENTRA_TENANT_ID: ${{ secrets.ENTRA_TENANT_ID }}
        run: bun run build

      - name: "📦 Package for ${{ matrix.name }} (unsigned)"
        # First iteration: explicitly disable signing to avoid CI failures
        # when the Apple/Windows cert secrets are not provisioned.
        # See docs/operations/release.md "Code Signing" section for the
        # plan to enable signed builds in a follow-on iteration.
        env:
          # Disable macOS signing + notarization autodetect
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          # Disable electron-builder auto-publish during package step.
          # The release job handles publishing via softprops/action-gh-release
          # instead, so matrix legs produce artifacts without contents:write.
          GH_TOKEN: ""
          BUILD_SCRIPT: ${{ matrix.build-script }}
        shell: bash
        run: bun run "$BUILD_SCRIPT" -- --publish never

      - name: "✅ Verify update manifests exist"
        # electron-builder generates latest-*.yml manifests from the
        # build.publish config in package.json. If these are missing, the
        # auto-updater won't be able to find new versions. Catch this early.
        shell: bash
        run: |
          echo "📋 Build output:"
          ls -lh release/ || true
          echo ""
          # Check for update manifests (platform-specific)
          if [ "${{ matrix.name }}" = "macos" ]; then
            ls release/latest-mac.yml 2>/dev/null || echo "⚠️ WARNING: latest-mac.yml not found"
          elif [ "${{ matrix.name }}" = "linux" ]; then
            ls release/latest-linux.yml 2>/dev/null || echo "⚠️ WARNING: latest-linux.yml not found"
          elif [ "${{ matrix.name }}" = "windows" ]; then
            ls release/latest.yml 2>/dev/null || echo "⚠️ WARNING: latest.yml not found"
          fi

      - name: "📤 Upload ${{ matrix.name }} artifacts"
        uses: actions/upload-artifact@v7
        with:
          name: installers-${{ matrix.name }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.deb
            release/*.exe
            release/*.yml
            release/*.blockmap
          if-no-files-found: warn
          retention-days: 7

  release:
    name: "🚀 Publish GitHub Release"
    needs: matrix-build
    # Allow partial releases during bootstrap: proceed even if some matrix
    # legs failed, as long as the job wasn't cancelled. This lets successfully
    # built platforms (e.g., Linux) be released while others are still being
    # fixed. Once all platforms are green, tighten this to just `needs:`.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: "📥 Download all OS artifacts"
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: installers-*
          merge-multiple: true

      - name: "📋 List downloaded artifacts"
        shell: bash
        run: ls -lh artifacts/

      - name: "🏷️  Resolve release tag"
        id: tag
        env:
          # Trusted values routed through env: to avoid inline interpolation
          # in the shell script (injection-safe pattern).
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          DISPATCH_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$DISPATCH_VERSION"
          else
            TAG="$REF_NAME"
          fi
          if [ -z "$TAG" ]; then
            echo "❌ Could not resolve release tag"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "📦 Releasing as tag: $TAG"

      - name: "✅ Verify version consistency"
        # Catch tag/package.json mismatches early — especially for manual
        # workflow_dispatch runs where the tag is user-provided.
        shell: bash
        run: |
          PKG_VERSION="v$(jq -r .version package.json)"
          TAG="${{ steps.tag.outputs.tag }}"
          echo "📦 package.json version: $PKG_VERSION"
          echo "🏷️  Release tag:          $TAG"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "⚠️ WARNING: Version mismatch — package.json=$PKG_VERSION, tag=$TAG"
            echo "   The published app will report $PKG_VERSION, not $TAG."
            echo "   Consider re-tagging after bumping package.json."
          fi

      - name: "🚀 Publish GitHub Release"
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "1Code ${{ steps.tag.outputs.tag }}"
          draft: true
          prerelease: ${{ contains(steps.tag.outputs.tag, '-beta') || contains(steps.tag.outputs.tag, '-rc') || contains(steps.tag.outputs.tag, '-alpha') }}
          generate_release_notes: true
          body: |
            ## 1Code ${{ steps.tag.outputs.tag }}

            Desktop installers for macOS, Linux, and Windows.

            > ⚠️ **Unsigned builds** — first iteration ships without code signing.
            > You will see Gatekeeper (macOS) or SmartScreen (Windows) warnings.
            > Code signing will be enabled in a follow-on iteration once
            > Apple Developer ID and Windows EV certificates are provisioned.
            >
            > **macOS unsigned install:** after dragging to Applications, run:
            > `xattr -d com.apple.quarantine /Applications/1Code.app`
            > This removes only the quarantine flag (not all xattrs). Only run
            > this if you trust the source of this download (this GitHub Release).

            ### Auto-update

            Existing installs will auto-update via `electron-updater`'s
            GitHub provider, reading `latest-mac.yml`, `latest.yml`, and
            `latest-linux.yml` from this Release.

            ### Artifacts

            | Platform | File |
            |---|---|
            | macOS arm64 | `1Code-*.arm64.dmg`, `1Code-*.arm64-mac.zip` |
            | macOS Intel | `1Code-*.dmg`, `1Code-*-mac.zip` |
            | Linux | `1Code-*.AppImage`, `1code-desktop_*_amd64.deb` |
            | Windows | `1Code-Setup-*.exe` (NSIS), `1Code-*-portable.exe` |

            See [`docs/operations/release.md`](https://github.com/jrmatherly/1dev/blob/main/docs/operations/release.md) for the release runbook.
          files: |
            artifacts/*.dmg
            artifacts/*.zip
            artifacts/*.AppImage
            artifacts/*.deb
            artifacts/*.exe
            artifacts/*.yml
            artifacts/*.blockmap
          # Allow partial releases during bootstrap — if a platform build
          # failed, its artifacts won't exist. Set to `true` once all
          # platforms are consistently green.
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
