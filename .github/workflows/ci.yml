# CI for the 1Code enterprise fork.
#
# Phase 0 hard gate #9 — see docs/enterprise/phase-0-gates.md
#
# Five quality gates run in parallel:
#   1. ts:check    - tsgo-based TypeScript check (stricter than tsc)
#   2. build       - full electron-vite 5 build (main + preload + renderer)
#   3. test        - bun:test regression guards under tests/regression/
#   4. audit       - bun audit dependency vulnerability scan
#   5. docs-build  - xyd build against docs/ (validates documentation site)
#
# A sixth job (status) aggregates them so branch protection can require a
# single check. None of these run on push-to-main; they only gate PRs.
#
# Concurrency: new commits to the same PR cancel in-progress runs.
#
# Security notes:
#   - No untrusted event inputs are used in any run: step.
#   - The only expression interpolation is on trusted needs.<job>.result in
#     the status aggregator (via env vars, not inline).

name: "🚀 CI"

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ts-check:
    name: "🔍 TypeScript (tsgo)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: "📦 Install Bun"
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: "🔧 Install system build deps"
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - name: "⬇️ Install dependencies"
        run: bun install --frozen-lockfile

      - name: "🏗️ Install tsgo"
        run: bun add -g @typescript/native-preview

      - name: "🔍 Run ts:check (baseline-aware)"
        # Matches the local PostToolUse hook convention documented in
        # .claude/rules/tscheck-baseline.md: only fail if the error count
        # exceeds `.claude/.tscheck-baseline`. The 80 pre-existing errors
        # are tracked in `docs/operations/roadmap.md` under "ts:check
        # baseline remediation". This step enforces "no new regressions".
        #
        # Security note: this script only reads files from the checked-out
        # repo and the output of `bun run ts:check` (a deterministic local
        # command). It does NOT interpolate any `${{ github.event.* }}`
        # values, so no command-injection surface is introduced.
        run: |
          if [ ! -f .claude/.tscheck-baseline ]; then
            echo "❌ .claude/.tscheck-baseline missing — CI requires a baseline file"
            exit 1
          fi
          BASELINE=$(cat .claude/.tscheck-baseline | tr -d '[:space:]')
          if ! [[ "$BASELINE" =~ ^[0-9]+$ ]]; then
            echo "❌ .claude/.tscheck-baseline is not a non-negative integer: '$BASELINE'"
            exit 1
          fi
          # Capture output; `bun run ts:check` returns non-zero whenever any
          # error is reported, so we must not let the non-zero exit kill the
          # shell before we read the count.
          set +e
          bun run ts:check 2>&1 | tee /tmp/tscheck-output.txt
          set -e
          ACTUAL=$(grep -cE '^[^ ].*\.tsx?\([0-9]+,[0-9]+\): error' /tmp/tscheck-output.txt || true)
          echo ""
          echo "📊 TS errors — baseline: $BASELINE, actual: $ACTUAL"
          if [ "$ACTUAL" -gt "$BASELINE" ]; then
            echo "❌ New TS errors introduced ($ACTUAL > $BASELINE baseline)"
            exit 1
          fi
          if [ "$ACTUAL" -lt "$BASELINE" ]; then
            echo "💡 TS errors dropped below baseline ($ACTUAL < $BASELINE)."
            echo "   Update .claude/.tscheck-baseline to $ACTUAL to ratchet."
          fi
          echo "✅ TS error count within baseline"

  build:
    name: "🏗️ Build (electron-vite)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: "📦 Install Bun"
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: "🔧 Install system build deps"
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - name: "⬇️ Install dependencies"
        run: bun install --frozen-lockfile

      - name: "🏗️ Run build"
        run: bun run build

  test:
    name: "🧪 Tests (bun:test)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: "📦 Install Bun"
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: "🔧 Install system build deps"
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - name: "⬇️ Install dependencies"
        run: bun install --frozen-lockfile

      - name: "🧪 Run regression tests"
        run: bun test

      - name: "📋 Validate OpenSpec"
        run: bunx @fission-ai/openspec@1.2.0 validate --all --strict --no-interactive

  audit:
    name: "🛡️ Dependency audit"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: "📦 Install Bun"
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: "⬇️ Install dependencies"
        run: bun install --frozen-lockfile

      - name: "🛡️ Run bun audit"
        run: |
          # bun audit exits non-zero for ANY advisory, including pre-existing
          # transitive dev-dep vulnerabilities (58+ as of 2026-04-09).
          # Capture output for PR review; do not fail the build.
          bun audit 2>&1 | tee /tmp/audit-output.txt || true
          HIGH_COUNT=$(grep -c "high:" /tmp/audit-output.txt || true)
          echo "📊 Advisory summary: $HIGH_COUNT high-severity lines (includes transitive dev deps)"

  docs-build:
    name: "📚 Docs build (xyd)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: "📦 Install Bun"
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # xyd-js CLI requires Node >= 22 at runtime. The default Ubuntu runner
      # ships Node 20, which causes `xyd build` to refuse to start. Pin to
      # Node 24 (aligns with Electron 41's bundled Node 24.14 for dev parity).
      #
      # Version pin: v6 (v6.3.0+). The older v4 was declared `using: node20`
      # in its action.yml, which triggered GitHub's Node 20 deprecation
      # warning ("will be removed 2026-09-16"). v6 is declared `using: node24`
      # and is future-proof through the transition.
      - name: "📦 Install Node 24"
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: "⬇️ Install docs dependencies"
        working-directory: docs
        run: bun install --frozen-lockfile

      - name: "📚 Build docs site"
        working-directory: docs
        run: bun run build

  status:
    name: "✅ CI Status"
    runs-on: ubuntu-latest
    permissions: {}
    needs: [ts-check, build, test, audit, docs-build]
    if: always()
    env:
      TS_CHECK_RESULT: ${{ needs.ts-check.result }}
      BUILD_RESULT: ${{ needs.build.result }}
      TEST_RESULT: ${{ needs.test.result }}
      AUDIT_RESULT: ${{ needs.audit.result }}
      DOCS_BUILD_RESULT: ${{ needs.docs-build.result }}
    steps:
      - name: "🔎 Check upstream job results"
        run: |
          echo "🔍 ts:check    → $TS_CHECK_RESULT"
          echo "🏗️ build       → $BUILD_RESULT"
          echo "🧪 test        → $TEST_RESULT"
          echo "🛡️ audit       → $AUDIT_RESULT"
          echo "📚 docs-build  → $DOCS_BUILD_RESULT"
          echo ""
          if [ "$TS_CHECK_RESULT" != "success" ] \
            || [ "$BUILD_RESULT" != "success" ] \
            || [ "$TEST_RESULT" != "success" ] \
            || [ "$AUDIT_RESULT" != "success" ] \
            || [ "$DOCS_BUILD_RESULT" != "success" ]; then
            echo "❌ One or more CI jobs failed."
            exit 1
          fi
          echo "✅ All CI jobs passed."
