name: Container Build — 1code-api

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag override (default: git SHA)"
        required: false

permissions:
  contents: read
  packages: write
  id-token: write # Cosign keyless signing via GitHub OIDC

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/1code-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: services/1code-api
          file: services/1code-api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Run Trivy vulnerability scanner
        # SHA-pinned to 0.35.0 — the only safe tag after the March 2026 supply-chain
        # compromise (GHSA-69fq-xp46-6x23 / CVE-2026-33634). 76 of 77 tags were
        # force-pushed to infostealer malware during 2026-03-19 → 2026-03-20.
        # 0.35.0 is protected by GitHub's immutable releases feature (enabled
        # 2026-03-04, before 0.35.0 was published). Never downgrade this pin.
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          # Reference the image by content digest produced by build-push-action.
          # Digest is immutable and always resolvable after push, unlike
          # ${{ github.sha }} (full 40-char) which does not match the short
          # 7-char SHA tag produced by docker/metadata-action `type=sha`.
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          # Repo-root .trivyignore holds CVE exemptions with justification +
          # expiry notes. Review quarterly; remove entries as base-image
          # rebuilds pull upstream fixes. See .trivyignore for current exemptions.
          trivyignores: ".trivyignore"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign container image
        env:
          # DIGEST comes from docker/build-push-action (not metadata-action —
          # metadata-action has no `digest` output). Digest is the immutable
          # content address of the just-pushed image, suitable for Cosign.
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          # Sign each tag with keyless (GitHub OIDC)
          # TAGS comes from docker/metadata-action; DIGEST from build-push-action.
          # Neither is user input.
          for tag in $TAGS; do
            cosign sign --yes "${tag}@${DIGEST}" || cosign sign --yes "${tag}"
          done
